framework: "net10.0"
overview: "Gapless Web Audio playback for eligible audio queues."
description: >
  Adds an experimental local Web Audio player to the Jellyfin web client that
  plays eligible direct-play audio queues gaplessly by decoding and scheduling
  adjacent tracks on a shared AudioContext timeline. The stock HTML audio player
  remains the fallback. The plugin injects its client bundle into the served web
  client on startup.
